# Grafana dashboard provider (US-023).
#
# Auto-loads every JSON dashboard from /etc/grafana/dashboards. The compose
# file mounts config/grafana/dashboards there read-only so edits on disk show
# up after Grafana picks them up (updateIntervalSeconds = 30).

apiVersion: 1

providers:
  - name: "fraud-copilot"
    orgId: 1
    folder: "Fraud Copilot"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
