name: evals-nightly

on:
  schedule:
    # 07:15 UTC every day. Avoid 00:00 to skip the GitHub Actions
    # global cron-stampede minute.
    - cron: '15 7 * * *'
  workflow_dispatch: {}

jobs:
  evals-full:
    name: Nightly full eval suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate dataset schemas
        run: python -m evals.validate

      - name: Run full evals
        run: python -m evals.run --output evals-scorecard.json

      - name: Upload scorecard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-nightly-scorecard
          path: evals-scorecard.json
          retention-days: 90
