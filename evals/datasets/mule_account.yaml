# Eval case: mule_account
#
# A mule-typology alert. The customer's accounts show repeated inbound
# wires from high-risk geographies followed by rapid outbound dispersal.
# The expected outcome is `high_risk` — the agent must call the
# transactions subskill, surface the mule-hub flag, and recommend
# escalation. OSINT is invoked to look for adverse media on the
# counterparty network.
#
# The mock stack returns deterministic "mule" data for cust-mule-01
# (transactions mock: 40-60 txs, every 3rd inbound wire from NG/RU/TR/MY/HK,
# surfaces burst_inbound + mule_hub_inflow).

id: mule_account
description: |
  Mule-hub typology. Customer's recently-opened account shows >40
  transactions including repeated inbound wires from high-risk
  geographies that disperse outbound within 24h. The agent must
  identify the mule-hub-inflow signal and recommend L3 escalation +
  SAR draft.

scenario: mule

input_alert:
  alert_id: alert-mule-0001
  customer_id: cust-mule-01
  alert_type: mule_account
  severity: high
  opened_at: "2026-05-26T09:15:00Z"
  notes: |
    Transaction-monitoring rule TM-021 triggered: 8 inbound wires from
    NG/TR within 72h, each followed by an outbound to a different
    counterparty within 24h. Combined volume $84,500.

expected_tool_calls:
  - { server: customer_data, tool: get_customer }
  - { server: customer_data, tool: list_accounts }
  - { server: customer_data, tool: get_device_history }
  - { server: transactions,  tool: get_transactions }
  - { server: transactions,  tool: get_counterparties }
  - { server: transactions,  tool: flag_velocity_anomalies }
  - { server: osint,         tool: web_search }
  - { server: osint,         tool: lookup_company }

# Profile must precede transactions analysis (the agent needs to know
# which customer's accounts to query). Transaction analysis must
# precede the OSINT lookup (the agent should know who the
# counterparties are before searching public sources).
ordering_constraints:
  - before: { server: customer_data, tool: get_customer }
    after:  { server: transactions,  tool: get_transactions }
  - before: { server: transactions,  tool: get_transactions }
    after:  { server: transactions,  tool: flag_velocity_anomalies }
  - before: { server: transactions,  tool: get_counterparties }
    after:  { server: osint,         tool: lookup_company }

expected_verdict: high_risk

required_facts:
  - claim: customer profile retrieved with mule scenario flags
    supporting_tool: { server: customer_data, tool: get_customer }
  - claim: accounts list shows recently-opened mule account
    supporting_tool: { server: customer_data, tool: list_accounts }
  - claim: transaction volume exceeds 40 with high-risk inbound wires
    supporting_tool: { server: transactions, tool: get_transactions }
  - claim: counterparty rollup surfaces multiple high-risk-geo senders
    supporting_tool: { server: transactions, tool: get_counterparties }
  - claim: velocity-anomaly flag mule_hub_inflow is true
    supporting_tool: { server: transactions, tool: flag_velocity_anomalies }
  - claim: OSINT lookup returns adverse media on counterparty network
    supporting_tool: { server: osint, tool: lookup_company }
